version: 1
profile: "balanced"  # balanced | aggressive | conservative

contest:
  slug: "example-ctf-2026"
  platform: "ctfd"
  base_url: "https://example-ctf.com"
  timezone: "UTC"
  start_time: "2026-04-01T00:00:00Z"
  end_time: "2026-04-03T00:00:00Z"
  # organizer-announced release times; scheduler forces refresh around these points
  release_windows:
    - "2026-04-01T12:00:00Z"

credentials:
  username_env: "CTF_USERNAME"
  password_env: "CTF_PASSWORD"
  session_token_env: "CTF_SESSION_TOKEN"  # preferred for workers if available

mcp:
  scrapling:
    enabled: true
    server_name: "scrapling-mcp"
    timeout_sec: 30
    retry:
      attempts: 3
      backoff_sec: 2

collection:
  polling:
    normal_interval_sec: 300
    high_freq_interval_sec: 60
    high_freq_before_release_min: 3
    high_freq_after_release_min: 5
  change_detection:
    check_hints: true
    check_attachments: true
    attachment_hash_algo: "sha256"
    hint_hash_algo: "sha256"

scheduler:
  enabled: true
  max_concurrency: 3
  queue_strategy: "priority_desc"
  dispatch_tick_sec: 15
  cooldown_min: 20
  retry_blocked_after_min: 10

prioritization:
  category_weight:
    crypto: 100
    reverse: 100
    pwn: 70
    web: 70
    forensics: 65
    misc: 60
    unknown: 50
  solved_count_weight: 0.2
  solved_count_cap: 500
  freshness_bonus:
    enabled: true
    new_task_window_min: 60
    score: 20
  change_bonus:
    hint_updated: 15
    attachment_updated: 15
  spike_boost:
    enabled: true
    window_min: 10
    threshold: 10
    score: 10

stop_rules:
  hard_timeout_min: 45
  no_progress_min: 15
  max_failed_attempts: 5
  on_trigger: "move_to_cooldown"  # move_to_cooldown | mark_failed

workers:
  solver_mode: "subagent"  # subagent | single-session
  pass_credentials: "token_only"  # token_only | full_credentials
  heartbeat_sec: 30
  result_contract: "event.schema.v1"

submission:
  mode: "print_only"  # print_only | auto_submit
  auto_submit_requires_confidence: 0.9
  accepted_status_text:
    - "Correct"
    - "Accepted"

artifacts:
  generate_writeup: true
  generate_enhance: true
  writeup_language: "zh-CN"
  enhance_language: "zh-CN"

paths:
  workspace_root: "."
  contests_root: "./"
  contest_dir: "./${contest.slug}"
  queue_log: "./${contest.slug}/runtime/queue.jsonl"
  events_log: "./${contest.slug}/runtime/events.jsonl"
  scoreboard: "./${contest.slug}/runtime/scoreboard.json"

observability:
  log_level: "info"
  redact:
    - "flag"
    - "cookie"
    - "token"
  metrics:
    enabled: true
    flush_interval_sec: 60
